<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Quiz — Deutsch Lernen</title>
  <link rel="stylesheet" href="css/main.css">
  <link rel="stylesheet" href="css/quiz.css">
</head>
<body>

  <!-- Navigation -->
  <nav class="navbar">
    <div class="nav-inner">
      <a href="index.html" class="nav-logo">🇩🇪 Deutsch<span>Lernen</span></a>
      <ul class="nav-links">
        <li><a href="index.html">Topics</a></li>
        <li><a href="progress.html">Progress</a></li>
      </ul>
      <div class="nav-actions">
        <button class="theme-toggle" onclick="App.toggleTheme()">🌙</button>
        <button class="nav-hamburger">☰</button>
      </div>
    </div>
  </nav>

  <!-- Main Content -->
  <main class="container">
    <div class="page-header">
      <h1>Quiz</h1>
      <div class="progress-bar-container" style="max-width:500px; margin:0.75rem auto 0;">
        <div class="progress-bar-fill" style="width:0%"></div>
      </div>
    </div>

    <div class="quiz-area">

      <!-- Quiz Header -->
      <div class="quiz-header">
        <p class="question-count">Question 1 of 10</p>
      </div>

      <!-- Question Card -->
      <div class="question-card">
        <p class="prompt">What does this word mean?</p>
        <p class="german-word">Loading...</p>
        <button class="speak-btn" onclick="Audio.speak(document.querySelector('.german-word').textContent)" title="Listen" style="margin:0 auto;">🔊</button>
      </div>

      <!-- Answer Options -->
      <div class="answer-options">
        <!-- Generated by quiz.js -->
      </div>

      <!-- Feedback -->
      <div class="quiz-feedback"></div>

    </div>
  </main>

  <script src="js/progress.js"></script>
  <script src="js/audio.js"></script>
  <script src="js/app.js"></script>
  <script src="js/quiz.js"></script>
</body>
</html>
